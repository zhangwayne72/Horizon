name: Daily Horizon Summary

on:
  schedule:
    # 每天 UTC 时间 00:30 运行，即北京时间 08:30
    - cron: '30 0 * * *'
  workflow_dispatch: # 允许手动点击触发

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允许提交生成的简报到 Pages

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        version: "0.11.26"

    - name: Install dependencies
      run: uv sync

    - name: Run Horizon
      env:
        # 核心：精准传入你配置的飞书和 Gemini 密钥
        FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        DS_API_KEY: ${{ secrets.DS_API_KEY }}
      run: uv run horizon --hours 24

    - name: Set current date as environment variable
      run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs
        keep_files: true 
        commit_message: "📝 Daily Summary: ${{ env.DATE }}"
        publish_branch: gh-pages
        enable_jekyll: true
